name: Expo Build Check
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'package.json'
      - 'app.json'

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Instalar dependencias
        run: npm install
      
      - name: Verificar TypeScript
        run: npx tsc --noEmit
        continue-on-error: true
      
      - name: Expo Export
        run: npx expo export --platform web
      
      - name: Build exitoso
        run: echo "✅ App compila correctamente"